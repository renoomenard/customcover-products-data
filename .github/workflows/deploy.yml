name: Trigger Country Site Deploys

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AU site rebuild
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_AU }}"

